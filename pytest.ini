[pytest]
markers =
    real_llm: Tests that call the real DeepSeek V4 API (requires API key in .env)
    smoke: Quick smoke tests to verify basic connectivity
    slow: Tests that take >10s due to LLM API latency
asyncio_default_fixture_loop_scope = function
asyncio_mode = auto
filterwarnings =
    ignore:.*pkg_resources.*:DeprecationWarning
